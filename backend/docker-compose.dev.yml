version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chaos-messenger-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chaos_messenger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chaos-network

  redis:
    image: redis:7-alpine
    container_name: chaos-messenger-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chaos-network

volumes:
  postgres_data:
  redis_data:

networks:
  chaos-network:
    driver: bridge
