version: '3.8'
services:
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./src/main/resources/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./src/main/resources/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./src/main/resources/chaos-messenger-dashboard.json:/var/lib/grafana/dashboards/chaos-messenger-dashboard.json:ro

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=chaos
      - POSTGRES_USER=chaos
      - POSTGRES_PASSWORD=chaos
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/chaos
      - SPRING_DATA_REDIS_HOST=redis
      - JWT_SECRET=please-change-this-secret-key-please
    depends_on:
      - postgres
      - redis

volumes:
  grafana-data:
  prometheus-data:
  postgres-data:
