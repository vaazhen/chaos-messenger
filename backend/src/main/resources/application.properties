# Chaos Messenger Configuration

spring.application.name=chaos-messenger

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/chaos_messenger
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Server
server.address=0.0.0.0
server.port=8080

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Security & JWT
logging.level.org.springframework.security=INFO
jwt.secret=${JWT_SECRET:very-secret-key-very-secret-key-123456}
jwt.expiration=86400000

# Logging
logging.level.ru.messenger.chaosmessenger=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.messaging=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator & Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.endpoints.web.base-path=/actuator
server.error.include-message=always

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# CORS
# Use exact origins in production. Patterns are enabled to make local/LAN Vite dev server work.
chaos.cors.allowed-origin-patterns=${CHAOS_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://192.168.*.*:*,http://10.*.*.*:*,http://172.*.*.*:*}
chaos.cors.allowed-origins=${CHAOS_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# WebSocket
spring.websocket.message-broker.simple.broadcast-period=5000
spring.websocket.message-broker.simple.relay-write-buffer-size=16384
