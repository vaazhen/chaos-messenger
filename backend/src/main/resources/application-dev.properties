# ── Development profile ───────────────────────────────────────────────────────
# Activate with: SPRING_PROFILES_ACTIVE=dev
# or in IntelliJ Run Configuration: Active profiles = dev

# Expose all actuator endpoints including Prometheus in dev
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Show full error messages in dev
server.error.include-message=always

# Verbose logging
logging.level.ru.messenger.chaosmessenger=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.messaging=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Relaxed CORS for local LAN access (Vite dev server)
chaos.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,http://192.168.*.*:*,http://10.*.*.*:*,http://172.*.*.*:*
chaos.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173