# Test configuration (used when @ActiveProfiles("test"))

spring.application.name=chaos-messenger-test

# Database (will be overridden by Testcontainers in tests)
spring.datasource.url=jdbc:postgresql://localhost:5432/chaos_messenger_test
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Redis (will be overridden by Testcontainers)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Flyway
spring.flyway.enabled=false

# JWT
jwt.secret=test-secret-key-must-be-32-chars-long!!
jwt.expiration=86400000

# Logging
logging.level.root=WARN
logging.level.ru.messenger.chaosmessenger=INFO
